[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/gemini/suggest-todo"
  to = "/.netlify/functions/suggest-todo"
  status = 200

[[redirects]]
  from = "/api/gemini/quote"
  to = "/.netlify/functions/quote"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
